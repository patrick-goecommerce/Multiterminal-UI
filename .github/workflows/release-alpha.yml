name: Release Alpha

on:
  push:
    tags:
      - "v*-alpha*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Stamp version into PE metadata
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/\"productVersion\": \".*\"/\"productVersion\": \"$VERSION\"/" wails.json

      - name: Build Windows amd64
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          wails3 build -ldflags "-X github.com/patrick-goecommerce/Multiterminal-UI/internal/backend.Version=$VERSION"

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stage release artifact
        shell: bash
        run: |
          mv build/bin/mtui-portable.exe "mtui-portable-${{ steps.version.outputs.version }}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: mtui-windows-alpha
          path: mtui-portable-*.exe

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            artifacts/mtui-portable-*.exe
